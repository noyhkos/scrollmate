<h2>위젯 (1x1 Small)</h2>
<p class="subtitle">비활성 상태와 활성 상태 — 버튼이 어떻게 바뀔지</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">비활성 상태</div>
    <div class="mockup-body" style="display:flex;justify-content:center;padding:24px;">
      <div style="background:#1c1c1e;border-radius:20px;width:155px;height:155px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;box-sizing:border-box;padding:16px;">
        <div style="color:#fff;font-size:12px;font-weight:600;">Scrollmate</div>
        <div style="background:#34c759;border-radius:14px;padding:12px 0;color:#fff;font-weight:700;font-size:15px;width:100%;text-align:center;">▶ 시작</div>
      </div>
    </div>
  </div>
  <div class="mockup">
    <div class="mockup-header">활성 상태</div>
    <div class="mockup-body" style="display:flex;justify-content:center;padding:24px;">
      <div style="background:#1c1c1e;border-radius:20px;width:155px;height:155px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;box-sizing:border-box;padding:16px;">
        <div style="color:#34c759;font-size:12px;font-weight:600;">● 알림 중</div>
        <div style="background:#ff3b30;border-radius:14px;padding:12px 0;color:#fff;font-weight:700;font-size:15px;width:100%;text-align:center;">■ 종료</div>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top:24px;">
  <p class="subtitle" style="font-size:13px;">
    비활성: <strong>시작 버튼</strong> → 탭하면 알림 시작, 버튼이 종료로 전환<br/>
    활성: <strong>종료 버튼</strong> → 탭하면 알림 중단, 버튼이 시작으로 전환
  </p>
</div>
